body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--txt);min-height:100vh}

.hdr-brand h1{font-family:'Playfair Display',serif;font-size:1.42rem;font-weight:700;line-height:1.1}
.hdr-brand h1 em{color:var(--warm);font-style:normal}
.hdr-brand p{font-size:.69rem;color:var(--leaf);margin-top:3px}
.hdr-btns{display:flex;gap:7px;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:8px;border:none;font-family:'DM Sans',sans-serif;font-size:.78rem;font-weight:600;cursor:pointer;transition:all .15s}
.btn-green{background:var(--palm);color:#fff}
.btn-green:hover{background:var(--jungle-lt)}
.btn-ghost{background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.2)}
.btn-ghost:hover{background:rgba(255,255,255,.2)}
.btn-danger{background:var(--danger);color:#fff}
.btn-danger:hover{background:#a93226}
.btn-sand{background:var(--sand);color:var(--txt-mid)}
.btn-sand:hover{background:var(--sand-d)}
.btn-sm{padding:5px 9px;font-size:.72rem}
.btn-icon{padding:4px 7px;font-size:.82rem}
.flights{background:linear-gradient(100deg,var(--jungle-mid),var(--jungle));color:#fff;padding:11px 34px;display:flex;gap:32px;align-items:center;flex-wrap:wrap}
.fl{display:flex;align-items:center;gap:10px;font-size:.78rem}
.fl strong{display:block;font-size:.84rem}
.fl span{color:var(--leaf);font-size:.71rem}
.main{max-width:1060px;margin:0 auto;padding:26px 20px 80px}
.stats{background:#fff;border-radius:14px;padding:14px 20px;margin-bottom:20px;box-shadow:var(--shadow);display:flex;gap:24px;flex-wrap:wrap}
.stat .v{font-family:'Playfair Display',serif;font-size:1.5rem;color:var(--jungle);display:block}
.stat .l{font-size:.65rem;color:var(--txt-lt);text-transform:uppercase;margin-top:2px}
.days{display:flex;flex-direction:column;gap:16px}
.day{background:#fff;border-radius:16px;box-shadow:var(--shadow);overflow:hidden}
.day:hover{box-shadow:var(--shadow-lg)}
.day-hdr{display:flex;align-items:center;justify-content:space-between;padding:13px 18px;background:var(--jungle);color:#fff;cursor:pointer;gap:10px}
.day-hl{display:flex;align-items:center;gap:11px}
.day-pill{font-family:'DM Mono',monospace;font-size:.66rem;font-weight:500;background:rgba(255,255,255,.14);border-radius:6px;padding:3px 8px}
.day-ti h3{font-family:'Playfair Display',serif;font-size:.98rem;font-weight:600}
.day-ti p{font-size:.7rem;color:var(--leaf);margin-top:2px}
.day-hr{display:flex;align-items:center;gap:6px}
.day-cnt{font-size:.68rem;background:rgba(255,255,255,.15);border-radius:20px;padding:2px 8px}
.arrow{font-size:.95rem;transition:transform .22s}
.day.closed .arrow{transform:rotate(-90deg)}
.day-body{padding:0 18px 12px}
.day.closed .day-body{display:none}
.ev-list{padding-top:8px}
.ev{display:flex;gap:11px;align-items:flex-start;padding:8px 3px;border-bottom:1px dashed var(--sand-d)}

function initSupabase() {
  try {
    supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    return true;
  } catch(e) {
    console.warn('Supabase init failed');
    return false;
  }
}

function setSyncStatus(msg) {
  const txt = document.getElementById('syncText');
  if (txt) txt.textContent = msg;
}

async function loadFromSupabase() {
  if (!supabase) return null;
  try {
    const { data: rows } = await supabase
      .from('cr_itineraries')
      .select('data')
      .eq('id', ITINERARY_ID)
      .single();
    
    if (rows && rows.data && Array.isArray(rows.data)) {
      return rows.data;
    }
  } catch (e) {
    console.warn('Supabase load failed');
  }
  return null;
}

function loadLocal() {
  try {
    const raw = localStorage.getItem('cr_itinerary_v3');
    if (raw) {
      const p = JSON.parse(raw);
      if (Array.isArray(p)) return p;
    }
  } catch(e) {}
  return null;
}

async function save() {
  localStorage.setItem('cr_itinerary_v3', JSON.stringify(data));
  
  if (supabase) {
    setSyncStatus('Saving...');
    try {
      await supabase.from('cr_itineraries').upsert({
        id: ITINERARY_ID,
        data: data,
        updated_at: new Date().toISOString()
      }, { onConflict: 'id' });
      
      const el = document.getElementById('saveBadge');
      el.classList.add('on');
      setTimeout(() => el.classList.remove('on'), 1400);
      setSyncStatus('Synced');
    } catch(e) {
      console.warn('Save failed');
      setSyncStatus('Saved locally');
    }
  }
}

let saveTimeout;
function scheduleSave() {
  clearTimeout(saveTimeout);
  saveTimeout = setTimeout(save, 500);
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escA(s) { return String(s||'').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
function uid() { return '_' + Date.now() + Math.random().toString(36).slice(2,6); }

function render() {
  const container = document.getElementById('daysEl');
  container.innerHTML = '';
  data.forEach((day, di) => {
    const div = document.createElement('div');
    div.className = 'day';
    div.id = 'day-' + day.id;
    div.innerHTML = buildDayHTML(day, di);
    container.appendChild(div);
    wireAddRow(day.id, di);
  });
  updateStats();
}

function buildDayHTML(day, di) {
  const rows = day.events.length === 0
    ? '<div class="empty">No events</div>'
    : day.events.map((ev, ei) => buildEvHTML(ev, di, ei)).join('');

  return `
    <div class="day-hdr" onclick="toggleDay('day-${day.id}')">
      <div class="day-hl">
        <span class="day-pill">${esc(day.label)}</span>
        <div class="day-ti">
          <h3>${esc(day.title)}</h3>
          <p>${esc(day.subtitle)}</p>
        </div>
      </div>
      <div class="day-hr">
        <span class="day-cnt">${day.events.length}</span>
        <button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();openEditDay(${di})">✏️</button>
        <button class="btn btn-danger btn-sm" onclick="event.stopPropagation();delDay(${di})">🗑</button>
        <span class="arrow">▾</span>
      </div>
    </div>
    <div class="day-body">
      <div class="ev-list">${rows}</div>
      <div class="add-row" id="ar-${day.id}">
        <input class="an" type="text" placeholder="Event..." id="an-${day.id}">
        <input class="at" type="text" placeholder="9:00 AM" id="at-${day.id}">
        <select class="atp" id="atp-${day.id}">
          <option value="activity">Activity</option>
          <option value="food">Restaurant</option>
          <option value="coffee">Café</option>
          <option value="hotel">Hotel</option>
          <option value="transport">Transport</option>
          <option value="flight">Flight</option>
        </select>
        <button class="btn btn-green btn-sm" onclick="addEvent(${di})">＋</button>
      </div>
    </div>`;
}

function buildEvHTML(ev, di, ei) {
  const info = TYPE_INFO[ev.type] || {label:'Item', emoji:'📝', cls:''};
  return `
    <div class="ev" data-di="${di}" data-ei="${ei}" id="ev-${ev.id}">
      <span class="dh">⠿</span>
      <div class="ev-tw">
        <span class="ev-time" onclick="editTime(this,${di},${ei})">${esc(ev.time)||'—'}</span>
      </div>
      <div class="ev-body">
        <span class="badge ${info.cls}">${info.emoji} ${info.label}</span>
        <div><span class="ev-name" onclick="editName(this,${di},${ei})">${esc(ev.name)}</span></div>
        <span class="ev-notes ${ev.notes?'':'ph'}" onclick="editNotes(this,${di},${ei})">${esc(ev.notes||'Add notes...')}</span>
      </div>
      <div class="ev-acts">
        <button class="btn btn-sand btn-sm btn-icon" onclick="cycleType(${di},${ei})">🔄</button>
        <button class="btn btn-sand btn-sm btn-icon" onclick="moveEv(${di},${ei},-1)">↑</button>
        <button class="btn btn-sand btn-sm btn-icon" onclick="moveEv(${di},${ei},1)">↓</button>
        <button class="btn btn-danger btn-sm btn-icon" onclick="delEv(${di},${ei})">✕</button>
      </div>
    </div>`;
}

function reRenderDay(di) {
  const day = data[di];
  const card = document.getElementById('day-' + day.id);
  if (!card) { render(); return; }
  const closed = card.classList.contains('closed');
  card.innerHTML = buildDayHTML(day, di);
  if (closed) card.classList.add('closed');
  wireAddRow(day.id, di);
  updateStats();
  isLocalChange = true;
  scheduleSave();
}

function wireAddRow(dayId, di) {
  const inp = document.getElementById('an-' + dayId);
  if (inp) inp.addEventListener('keydown', e => { if (e.key === 'Enter') addEvent(di); });
}

function toggleDay(id) { document.getElementById(id).classList.toggle('closed'); }
function expandAll() { document.querySelectorAll('.day').forEach(d => d.classList.remove('closed')); }
function collapseAll() { document.querySelectorAll('.day').forEach(d => d.classList.add('closed')); }

function editTime(el, di, ei) {
  const inp = document.createElement('input');
  inp.type='text';
  inp.value = data[di].events[ei].time;
  el.replaceWith(inp); 
  inp.focus(); 
  inp.select();
  const done = () => { data[di].events[ei].time = inp.value; reRenderDay(di); };
  inp.addEventListener('blur', done);
  inp.addEventListener('keydown', e => { if(e.key==='Enter') inp.blur(); });
}

function editName(el, di, ei) {
  const inp = document.createElement('input');
  inp.type='text';
  inp.value = data[di].events[ei].name;
  el.replaceWith(inp); 
  inp.focus(); 
  inp.select();
  const done = () => { if(inp.value.trim()) data[di].events[ei].name = inp.value.trim(); reRenderDay(di); };
  inp.addEventListener('blur', done);
  inp.addEventListener('keydown', e => { if(e.key==='Enter') inp.blur(); });
}

function editNotes(el, di, ei) {
  const ta = document.createElement('textarea');
  ta.value = data[di].events[ei].notes || '';
  el.replaceWith(ta); 
  ta.focus();
  const done = () => { data[di].events[ei].notes = ta.value; reRenderDay(di); };
  ta.addEventListener('blur', done);
}

function cycleType(di, ei) {
  const cur = data[di].events[ei].type;
  const i = TYPE_ORDER.indexOf(cur);
  data[di].events[ei].type = TYPE_ORDER[(i+1) % TYPE_ORDER.length];
  reRenderDay(di);
}

function moveEv(di, ei, dir) {
  const evs = data[di].events;
  const ni = ei + dir;
  if (ni < 0 || ni >= evs.length) return;
  [evs[ei], evs[ni]] = [evs[ni], evs[ei]];
  reRenderDay(di);
}

function delEv(di, ei) {
  if (!confirm('Delete?')) return;
  data[di].events.splice(ei, 1);
  reRenderDay(di);
}

function addEvent(di) {
  const day = data[di];
  const nEl = document.getElementById('an-' + day.id);
  const tEl = document.getElementById('at-' + day.id);
  const tpEl = document.getElementById('atp-' + day.id);
  const name = nEl.value.trim();
  if (!name) { nEl.focus(); return; }
  day.events.push({
    id: uid(),
    time: tEl.value.trim(),
    type: tpEl.value,
    name,
    notes: '',
    alert: ''
  });
  nEl.value = ''; 
  tEl.value = '';
  reRenderDay(di);
}

function delDay(di) {
  if (!confirm('Delete day?')) return;
  data.splice(di, 1);
  render(); 
  isLocalChange = true; 
  scheduleSave();
}

function openAddDay() {
  showModal(`
    <h2>➕ Add Day</h2>
    <div class="fg"><label>Label</label><input id="m-lbl" value="Day ${data.length+1}"></div>
    <div class="fg"><label>Date</label><input id="m-date" placeholder="Mon, May 25"></div>
    <div class="fg"><label>Title</label><input id="m-title" placeholder="Day title"></div>
    <div class="m-acts">
      <button class="m-cancel" onclick="closeModal()">Cancel</button>
      <button class="m-ok" onclick="confirmAdd()">Add</button>
    </div>`);
}

function confirmAdd() {
  const lbl = document.getElementById('m-lbl').value.trim();
  const date = document.getElementById('m-date').value.trim();
  const title = document.getElementById('m-title').value.trim() || 'New Day';
  if (!lbl) { document.getElementById('m-lbl').focus(); return; }
  data.push({ id: uid(), date, label: lbl, title, subtitle: '', events: [] });
  closeModal(); 
  render(); 
  isLocalChange = true; 
  scheduleSave();
}

function openEditDay(di) {
  const d = data[di];
  showModal(`
    <h2>✏️ Edit Day</h2>
    <div class="fg"><label>Label</label><input id="m-lbl" value="${escA(d.label)}"></div>
    <div class="fg"><label>Date</label><input id="m-date" value="${escA(d.date)}"></div>
    <div class="fg"><label>Title</label><input id="m-title" value="${escA(d.title)}"></div>
    <div class="m-acts">
      <button class="m-cancel" onclick="closeModal()">Cancel</button>
      <button class="m-ok" onclick="confirmEdit(${di})">Save</button>
    </div>`);
}

function confirmEdit(di) {
  data[di].label = document.getElementById('m-lbl').value.trim();
  data[di].date = document.getElementById('m-date').value.trim();
  data[di].title = document.getElementById('m-title').value.trim();
  closeModal(); 
  render(); 
  isLocalChange = true; 
  scheduleSave();
}

function updateStats() {
  let evs=0, food=0, acts=0;
  data.forEach(d => {
    evs += d.events.length;
    d.events.forEach(ev => {
      if (ev.type==='food' || ev.type==='coffee') food++;
      if (ev.type==='activity') acts++;
    });
  });
  document.getElementById('sDays').textContent = data.length;
  document.getElementById('sEvs').textContent = evs;
  document.getElementById('sFood').textContent = food;
  document.getElementById('sActs').textContent = acts;
}

function showModal(html) {
  document.getElementById('mBox').innerHTML = html;
  document.getElementById('overlay').style.display = 'flex';
  setTimeout(() => { const f = document.querySelector('.modal input'); if(f) f.focus(); }, 60);
}

function closeModal() {
  document.getElementById('overlay').style.display = 'none';
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});

function doExport() {
  const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'itinerary.json';
  a.click();
  URL.revokeObjectURL(a.href);
}

function triggerImport() {
  document.getElementById('fileIn').click();
}

function handleImport(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const p = JSON.parse(ev.target.result);
      if (!Array.isArray(p)) throw new Error();
      data = p;
      render();
      isLocalChange = true;
      save();
    } catch {
      alert('Invalid file');
    }
  };
  reader.readAsText(file);
  e.target.value = '';
}

function resetToDefault() {
  if (!confirm('Reset to default?')) return;
  data = JSON.parse(JSON.stringify(DEFAULT_DATA));
  render();
  isLocalChange = true;
  scheduleSave();
}

function doPrint() {
  expandAll();
  setTimeout(() => window.print(), 300);
}

async function init() {
  // Load from Supabase first
  const sbData = await loadFromSupabase();
  if (sbData) {
    data = sbData;
    setSyncStatus('Loaded from cloud');
  } else {
    // Fall back to localStorage
    const lsData = loadLocal();
    if (lsData) {
      data = lsData;
      setSyncStatus('Loaded from device');
    } else {
      // Use defaults
      data = JSON.parse(JSON.stringify(DEFAULT_DATA));
      setSyncStatus('Ready');
    }
  }
  
  render();
  
  // Initialize Supabase for future saves
  initSupabase();
  save();
}

init();
</script>

</body>
</html>
